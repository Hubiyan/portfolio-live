<!-- Lab Desktop Icon: Box (cardboard)
  ══════════════════════════════════════════════════════
  USAGE: paste this SVG inline inside .lab-icon-figure.
  Do NOT use <img src> — CSS vars won't cascade into external SVGs.

  Color variables (set on body.lab-page or override inline):
    --folder-front  front face        default #c89b6d
    --folder-side   right side face   default #a97840
    --folder-top    top face          default #dab87e
    --folder-tape   tape patches      default #b5874e

  Geometry: oblique 30deg, bw=200 bh=200 (square front) dx=70 dy=40
  ViewBox 270x240
-->
<svg viewBox="0 0 270 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="lf-front-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.11)"/>
      <stop offset="28%"  stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(100,58,20,0.10)"/>
    </linearGradient>
    <linearGradient id="lf-top-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="lf-side-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.03)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </linearGradient>
    <pattern id="lf-grain" x="0" y="0" width="9" height="240" patternUnits="userSpaceOnUse">
      <line x1="0.4" y1="0" x2="0.4" y2="240" stroke="rgba(90,52,18,0.055)" stroke-width="0.6"/>
    </pattern>
    <clipPath id="lf-front-clip">
      <polygon points="0,40 200,40 200,240 0,240"/>
    </clipPath>
  </defs>
  <polygon class="lab-folder-side"      points="200,40 270,0 270,200 200,240"/>
  <polygon fill="url(#lf-side-shade)"   points="200,40 270,0 270,200 200,240"/>
  <polygon class="lab-folder-top"       points="70,0 270,0 200,40 0,40"/>
  <polygon fill="url(#lf-top-shade)"    points="70,0 270,0 200,40 0,40"/>
  <polygon class="lab-folder-front"     points="0,40 200,40 200,240 0,240"/>
  <rect x="0" y="40" width="200" height="200" fill="url(#lf-grain)" clip-path="url(#lf-front-clip)"/>
  <polygon fill="url(#lf-front-shade)"  points="0,40 200,40 200,240 0,240"/>
  <line x1="0" y1="83" x2="200" y2="83" stroke="rgba(255,255,255,0.13)" stroke-width="0.7"/>
  <line x1="0" y1="84" x2="200" y2="84" stroke="rgba(90,52,18,0.22)"   stroke-width="1"/>
  <rect class="lab-folder-tape" x="24" y="49" width="46" height="20" rx="1.5" opacity="0.72"/>
  <rect fill="rgba(255,255,255,0.07)"   x="24" y="49" width="46" height="20" rx="1.5" opacity="0.72"/>
  <rect class="lab-folder-tape" x="24" y="74" width="46" height="20" rx="1.5" opacity="0.67"/>
  <rect fill="rgba(255,255,255,0.07)"   x="24" y="74" width="46" height="20" rx="1.5" opacity="0.67"/>
  <polygon class="lab-folder-tape"      points="91,40 109,40 179,0 161,0" opacity="0.70"/>
  <polygon fill="rgba(255,255,255,0.07)"points="91,40 109,40 179,0 161,0" opacity="0.70"/>
  <line x1="0"   y1="40"  x2="200" y2="40"  stroke="rgba(255,255,255,0.3)"  stroke-width="1"/>
  <line x1="0"   y1="40"  x2="70"  y2="0"   stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  <line x1="70"  y1="0"   x2="270" y2="0"   stroke="rgba(255,255,255,0.16)" stroke-width="0.8"/>
  <line x1="200" y1="40"  x2="200" y2="240" stroke="rgba(0,0,0,0.20)"       stroke-width="1.2"/>
  <line x1="0"   y1="240" x2="200" y2="240" stroke="rgba(0,0,0,0.10)"       stroke-width="0.8"/>
  <line x1="200" y1="240" x2="270" y2="200" stroke="rgba(0,0,0,0.14)"       stroke-width="0.8"/>
</svg>
