<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab | Hubiyan</title>

    <link rel="icon" type="image/x-icon" href="../images/logos/main-logo.png">

</head>

<body class="ds-subpage lab-page" data-mat-color="green">

    <!-- ── Desktop canvas ──────────────────────────────────── -->
    <main id="lab-main" class="lab-main" aria-label="Lab desktop">

        <!-- ── Top lamp effect ─────────────────────────────── -->
        <div class="lab-lamp is-off" aria-hidden="true">
            <div class="lab-lamp__stage">
                <div class="lab-lamp__glow lab-lamp__glow--big"></div>
                <div class="lab-lamp__glow lab-lamp__glow--small"></div>
                <div class="lab-lamp__line"></div>
            </div>
        </div>

        <!-- ── Lamp power switch (top-left) ─────────────────── -->

                aria-label="Toggle lamp light" aria-pressed="false"
                style="left:24px;top:24px">
            <span class="lab-power-btn__core">
                <span class="lab-power-btn__inner"></span>
            </span>
        </button>

        <!-- ── Icon: Prompts ─────────────────────────────── -->
        <div class="lab-desktop-icon"
             data-icon-id="prompts"
             data-window="win-prompts"
             style="left:15%;top:51%;
                    --folder-front:#3a6ecf;
                    --folder-side: #2450a8;
                    --folder-top:  #5a8ee8;
                    --folder-tape: #2d5cbd;"
             tabindex="0" role="button"
             aria-label="Prompts — open in window">
            <div class="lab-icon-figure">
                <svg class="lab-box-svg" viewBox="0 0 270 240"
                     xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                    <polygon class="lab-folder-side" points="200,40 270,0 270,200 200,240"/>
                    <polygon class="lab-folder-top"  points="70,0 270,0 200,40 0,40"/>
                    <polygon class="lab-folder-front" points="0,40 200,40 200,240 0,240"/>
                    <line x1="0" y1="40" x2="200" y2="40" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
                    <line x1="200" y1="40" x2="200" y2="240" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
                    <text class="lab-box-emoji" x="100" y="148" text-anchor="middle" dominant-baseline="central">📝</text>
                </svg>
            </div>
            <span class="lab-icon-label">Prompts</span>
        </div>

        <!-- ── Icon: AI Bro Detector ─────────────────────── -->

             data-window="win-ai-bro"

                    --folder-side: #9e2929;
                    --folder-top:  #e06060;
                    --folder-tape: #b03030;"
             tabindex="0" role="button"
             aria-label="AI Bro Detector — open in window">
            <div class="lab-icon-figure">
                <svg class="lab-box-svg" viewBox="0 0 270 240"
                     xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                    <polygon class="lab-folder-side" points="200,40 270,0 270,200 200,240"/>
                    <polygon class="lab-folder-top"  points="70,0 270,0 200,40 0,40"/>
                    <polygon class="lab-folder-front" points="0,40 200,40 200,240 0,240"/>
                    <line x1="0" y1="40" x2="200" y2="40" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
                    <line x1="200" y1="40" x2="200" y2="240" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
                    <text class="lab-box-emoji" x="100" y="148" text-anchor="middle" dominant-baseline="central">🤖</text>
                </svg>

            <span class="lab-icon-label">AI Bro Detector</span>

            <div class="lab-icon-figure">

                    <line x1="0" y1="40" x2="200" y2="40" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
                    <line x1="200" y1="40" x2="200" y2="240" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>

        <!-- ── Icon: Visual Explorations (macOS folder) ──── -->
        <div class="lab-desktop-icon"
             data-icon-id="visual-exp"
             data-window="win-visual"

             tabindex="0" role="button"

            </div>

        <!-- ── Learning video card ─────────────────────────── -->
        <div class="lab-learning-card" id="lab-learning-card"
             data-widget-id="learning-video" role="region"
             aria-label="Currently learning video"
             style="left:35%;top:31%">
            <button type="button" class="lab-learning-card__min-btn" id="lab-learning-min-btn"
                    aria-label="Minimise video card" aria-expanded="true">
                <svg class="lab-learning-card__icon lab-learning-card__icon--min" viewBox="0 0 12 12"
                     width="12" height="12" aria-hidden="true" focusable="false">
                    <rect x="1.5" y="9" width="9" height="1.6" rx="0.4" fill="currentColor"/>
                </svg>
                <svg class="lab-learning-card__icon lab-learning-card__icon--max" viewBox="0 0 12 12"
                     width="12" height="12" aria-hidden="true" focusable="false">
                    <rect x="1.4" y="1.4" width="9.2" height="9.2" rx="1" fill="none"
                          stroke="currentColor" stroke-width="1.6"/>
                </svg>
            </button>
            <div class="lab-learning-card__chip">
                <div class="lab-learning-card__marquee">
                    <div class="lab-learning-card__marquee-track">
                        <span class="lab-learning-card__marquee-text">Currently learning...</span>
                        <span class="lab-learning-card__marquee-text" aria-hidden="true">Currently learning...</span>
                    </div>
                </div>
            </div>
            <div class="lab-learning-card__body">
              <div class="lab-learning-card__body-inner">
                <div class="lab-learning-card__player" id="lab-learning-player">
                    <button type="button" class="lab-learning-card__thumb-btn" id="lab-learning-thumb-btn"
                            aria-label="Play video">

                             loading="lazy">
                        <span class="lab-learning-card__play" aria-hidden="true">
                            <svg viewBox="0 0 68 48" width="68" height="48" focusable="false">
                                <path d="M66.52 7.74a7.5 7.5 0 0 0-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55A7.5 7.5 0 0 0 1.48 7.74C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26a7.5 7.5 0 0 0 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55a7.5 7.5 0 0 0 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="#FF0000"/>
                                <path d="M45 24 27 14v20z" fill="#fff"/>
                            </svg>
                        </span>
                    </button>
                    <iframe id="lab-learning-iframe" title="YouTube video player" hidden
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

                </div>
                <div class="lab-learning-card__info">
                    <p class="lab-learning-card__title" id="lab-learning-title"></p>
                    <p class="lab-learning-card__meta" id="lab-learning-meta"></p>

    </main>

    <!-- Close-all button — visible when ≥2 windows are open -->
    <button id="close-all-btn" hidden aria-label="Close all windows">Close all windows</button>

    <!-- macOS windows are generated by buildWindow() in the script below -->

    <!-- ── Colour switcher ───────────────────────────────────── -->
    <div class="lab-color-switcher" role="group" aria-label="Background colour">
        <button class="lab-swatch" data-color="green"  aria-label="Green mat"  aria-pressed="true"></button>
        <button class="lab-swatch" data-color="blue"   aria-label="Blue mat"   aria-pressed="false"></button>
        <button class="lab-swatch" data-color="black"  aria-label="Black mat"  aria-pressed="false"></button>
    </div>

    <script>
    /* ── Colour switcher ────────────────────────────────────── */
    (function () {
        var body     = document.body;
        var swatches = document.querySelectorAll('.lab-swatch');
        var saved    = localStorage.getItem('lab-mat-color');
        if (saved) {
            body.setAttribute('data-mat-color', saved);
            swatches.forEach(function (s) {
                s.setAttribute('aria-pressed', s.dataset.color === saved ? 'true' : 'false');
            });
        }
        swatches.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var color = btn.dataset.color;
                body.setAttribute('data-mat-color', color);
                localStorage.setItem('lab-mat-color', color);
                swatches.forEach(function (s) {
                    s.setAttribute('aria-pressed', s.dataset.color === color ? 'true' : 'false');
                });
            });
        });
    })();

    /* ── Wallpaper data ─────────────────────────────────────── */
    var WALLPAPERS = [
        {
            name:     'Andromeda Horizon',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon.png',
            filename: 'Andromeda-horizon.png'
        },
        {
            name:     'Andromeda Horizon No.1',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon-1.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-1.png',
            filename: 'Andromeda-horizon-1.png'
        },
        {
            name:     'Andromeda Horizon No.2',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon-2.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-2.png',
            filename: 'Andromeda-horizon-2.png'
        }
    ];

    /* ═══════════════════════════════════════════════════════════
       macOS Window component builder
       ═══════════════════════════════════════════════════════════
       To add a new window, append one entry to WIN_CONFIGS below.
       Types:  'browser'  → iframe + URL bar
               'finder'   → grid body + centered title
               'preview'  → image body + optional download toolbar
    ═══════════════════════════════════════════════════════════ */

    /* Shared SVG icon strings */
    var SVG_ICONS = {
        chevL:    '<svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M8 1L2 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        chevR:    '<svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        reload:   '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 2.5 A4.5 4.5 0 1 1 2.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/><polyline points="1,5.5 2.5,7 4,5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
        lock:     '<svg class="mac-urlbar-lock" width="9" height="12" viewBox="0 0 9 12" fill="none" aria-hidden="true"><rect x="1" y="5.5" width="7" height="6" rx="1.2" fill="currentColor"/><path d="M2.5 5.5V3.8a2 2 0 014 0v1.7" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>',
        download: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 1v8M4 6l2.5 3 2.5-3M1.5 11.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    /* Window registry — add entries here to create new windows */
    var WIN_CONFIGS = [
        { id: 'win-prompts', type: 'browser', title: 'Prompts',             src: '/lab/prompts/',         urlLabel: 'hubiyan.com/lab/prompts/' },
        { id: 'win-ai-bro',  type: 'browser', title: 'AI Bro Detector',     src: '/lab/ai-bro-detector/', urlLabel: 'hubiyan.com/lab/ai-bro-detector/' },
        { id: 'win-comment-bro', type: 'browser', title: 'Comment Bro', src: '/lab/comment-bro/', urlLabel: 'hubiyan.com/lab/comment-bro/' },
        { id: 'win-visual',  type: 'finder',  title: 'Visual Explorations' },
        { id: 'win-terminal', type: 'finder', title: 'Lab terminal', src: '/lab/terminal/' }
        /* Preview windows are created dynamically by openPreviewWindow() — no static entry needed */
    ];

    function buildWindow(cfg) {
        var win = document.createElement('div');
        win.className = 'mac-window' + (cfg.type !== 'browser' ? ' mac-window--' + cfg.type : '');
        win.id = cfg.id;
        if (cfg.src) win.dataset.src = cfg.src;
        win.hidden = true;

        /* ── Titlebar ── */
        var bar = document.createElement('div');
        bar.className = 'mac-window-titlebar';

        var ctrl = document.createElement('div');
        ctrl.className = 'mac-window-controls';
        ctrl.innerHTML =
            '<button class="mac-btn mac-btn--close" aria-label="Close"></button>' +
            '<button class="mac-btn mac-btn--max"   aria-label="Maximise"></button>';
        bar.appendChild(ctrl);

        if (cfg.type === 'browser') {
            var urlbar = document.createElement('div');
            urlbar.className = 'mac-window-urlbar';
            urlbar.innerHTML =
                '<button class="mac-nav-btn" data-nav="back"   aria-label="Go back">'    + SVG_ICONS.chevL  + '</button>' +
                '<button class="mac-nav-btn" data-nav="fwd"    aria-label="Go forward">' + SVG_ICONS.chevR  + '</button>' +
                '<button class="mac-nav-btn" data-nav="reload" aria-label="Reload">'     + SVG_ICONS.reload + '</button>' +
                '<div class="mac-urlbar-pill">' +
                    SVG_ICONS.lock +
                    '<span class="mac-urlbar-text" id="' + cfg.id + '-url">' + (cfg.urlLabel || '') + '</span>' +
                '</div>' +
                '<button class="mac-open-tab-btn" aria-label="Open current page in a new tab">Open in new tab</button>';
            bar.appendChild(urlbar);
        } else {
            var titleEl = document.createElement('span');
            titleEl.className = 'mac-window-title';
            if (cfg.type === 'preview') titleEl.id = 'preview-title';
            titleEl.textContent = cfg.title || '';
            bar.appendChild(titleEl);

            var right = document.createElement('div');
            right.className = 'mac-titlebar-right';
            if (cfg.type === 'preview') {
                right.innerHTML =
                    '<button class="mac-nav-btn" id="preview-prev" aria-label="Previous image">' + SVG_ICONS.chevL + '</button>' +
                    '<span class="mac-preview-counter" id="preview-counter"></span>' +
                    '<button class="mac-nav-btn" id="preview-next" aria-label="Next image">'    + SVG_ICONS.chevR + '</button>';
            }
            bar.appendChild(right);
        }

        win.appendChild(bar);

        /* ── Body ── */
        var body = document.createElement('div');
        body.className = 'mac-window-body';

        if (cfg.type === 'browser') {
            var iframe = document.createElement('iframe');
            iframe.className = 'mac-window-iframe';
            iframe.id    = cfg.id + '-iframe';
            iframe.title = cfg.title || '';
            /* src intentionally omitted — lazy-loaded on first open */
            body.appendChild(iframe);
        } else if (cfg.type === 'finder') {
            var grid = document.createElement('div');
            grid.className = 'mac-finder-grid';
            grid.id = 'finder-wallpapers';
            grid.setAttribute('aria-label', 'Wallpapers');
            body.appendChild(grid);
        } else if (cfg.type === 'preview') {
            var imgEl2 = document.createElement('img');
            imgEl2.className = 'mac-preview-img';
            imgEl2.width = 1; imgEl2.height = 1;
            body.appendChild(imgEl2);

            var vidEl2 = document.createElement('video');
            vidEl2.className = 'mac-preview-img mac-preview-video';
            vidEl2.autoplay = true;
            vidEl2.loop     = true;
            vidEl2.muted    = true;
            vidEl2.setAttribute('playsinline', '');
            vidEl2.hidden = true;
            body.appendChild(vidEl2);
        }

        win.appendChild(body);

        /* ── Toolbar (preview only — hidden when no download available) ── */
        if (cfg.type === 'preview') {
            var toolbar = document.createElement('div');
            toolbar.className = 'mac-preview-toolbar';
            toolbar.id = 'preview-toolbar';
            toolbar.innerHTML =
                '<span class="mac-preview-counter" id="preview-counter-bar"></span>' +
                '<a class="mac-preview-dl" id="preview-dl" href="" target="_blank" rel="noopener" download="" aria-label="Download">' +
                    SVG_ICONS.download + '<span>Download full resolution</span>' +
                '</a>';
            win.appendChild(toolbar);
        }

        return win;
    }

    /* Build and mount all static windows */
    WIN_CONFIGS.forEach(function (cfg) { document.body.appendChild(buildWindow(cfg)); });

    /* ── macOS Window system ────────────────────────────────── */
    var macZCounter      = 60;
    var finderPopulated  = false;

    /* Show / hide the "Close all" button depending on open window count */
    function syncCloseAll() {
        var btn = document.getElementById('close-all-btn');
        if (!btn) return;
        var n = document.querySelectorAll('.mac-window:not([hidden])').length;
        btn.hidden = n < 2;
    }
    document.getElementById('close-all-btn').addEventListener('click', function () {
        document.querySelectorAll('.mac-window:not([hidden])').forEach(function (w) {
            closeMacWin(w);
        });
    });

    function bringToFront(win) {
        macZCounter += 1;
        win.style.zIndex = String(macZCounter);
    }

    /**
     * Open a .mac-window with the open animation.
     * Iframes are lazy-loaded on first open.
     * The Finder grid is populated on first open.
     * On desktop, cascades lower-left off any open unmoved window.
     */
    function openMacWin(id) {
        var win = document.getElementById(id);
        if (!win) return;

        /* Already visible — just bring to front, no re-animation */
        if (!win.hidden) {
            bringToFront(win);
            syncCloseAll();
            return;
        }

        /* ── Reset position + state so each open is fresh ── */
        delete win.dataset.posResolved;
        delete win.dataset.moved;
        win.style.left      = '';
        win.style.top       = '';
        win.style.transform = '';

        /* ── Cascade: offset lower-left off the first open unmoved window (desktop) ── */
        var isMobile = window.matchMedia('(max-width: 520px)').matches;
        if (!isMobile) {
            var anchor = null;
            document.querySelectorAll('.mac-window:not([hidden])').forEach(function (w) {
                if (w !== win && !w.dataset.moved && !anchor) anchor = w;
            });
            if (anchor) {
                var r = anchor.getBoundingClientRect();
                var newLeft = Math.max(20, Math.min(r.left - 28, window.innerWidth  - 300));
                var newTop  = Math.max(20, Math.min(r.top  + 28, window.innerHeight - 200));
                win.style.left      = newLeft + 'px';
                win.style.top       = newTop  + 'px';
                win.style.transform = 'none';
                win.dataset.posResolved = '1';
            }
        }

        /* Reset animation state */
        win.classList.remove('is-closing', 'is-minimizing');
        win.hidden = false;
        void win.offsetWidth; /* force reflow so animation restarts cleanly */
        win.classList.add('is-opening');
        win.addEventListener('animationend', function () {
            win.classList.remove('is-opening');
        }, { once: true });

        bringToFront(win);
        syncCloseAll();

        /* Lazy-load iframe */
        var iframe = win.querySelector('.mac-window-iframe');
        if (iframe && !iframe.getAttribute('src')) {
            iframe.src = win.dataset.src;

            /* Keep URL bar in sync as user navigates inside */
            var urlText = win.querySelector('.mac-urlbar-text');
            if (urlText) {
                iframe.addEventListener('load', function () {
                    try {
                        var href = iframe.contentWindow.location.href;
                        urlText.textContent = href.replace(/^https?:\/\//, '');
                    } catch (_) {}
                });
            }
        }

        /* Populate Finder grid once */
        if (id === 'win-visual' && !finderPopulated) {
            populateFinderGrid();
        }
    }

    /**
     * Close with the close animation, then set hidden.
     */
    function closeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-closing');
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-closing');
            win.hidden = true;
            /* Dynamic preview windows are removed from the DOM on close */
            if (win.dataset.dynamic && win.parentNode) win.parentNode.removeChild(win);
            syncCloseAll();
        }
    }

    /**
     * Minimise with a shrink-down animation.
     */
    function minimizeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-minimizing');
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-minimizing');
            win.hidden = true;
            syncCloseAll();
        }
    }

    /**
     * Wire drag + traffic-light controls for any .mac-window element.
     * Called once per window (static or dynamically created).
     */
    function initWindow(win) {
        var sx, sy, sl, st;

        function resolvePos() {
            var r = win.getBoundingClientRect();
            win.style.left      = r.left + 'px';
            win.style.top       = r.top  + 'px';
            win.style.transform = 'none';
            win.dataset.posResolved = '1';
        }

        /* Traffic lights */
        var btnClose = win.querySelector('.mac-btn--close');
        var btnMax   = win.querySelector('.mac-btn--max');

        if (btnClose) btnClose.addEventListener('click', function (e) {
            e.stopPropagation();
            closeMacWin(win);
        });
        if (btnMax) btnMax.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!win.dataset.posResolved) resolvePos();
            win.classList.add('is-resizing');
            win.classList.toggle('is-maximized');
            win.addEventListener('transitionend', function () {
                win.classList.remove('is-resizing');
            }, { once: true });
        });

        /* iframe nav — manual URL stack so back/fwd never bubble to the parent browser */
        var iframe = win.querySelector('.mac-window-iframe');
        if (iframe) {
            var iHistory = [];   /* URLs visited inside this iframe  */
            var iPos     = -1;   /* current position in that stack   */
            var progNav  = false;/* true while we're driving the nav */

            var backNavBtn = win.querySelector('[data-nav="back"]');
            var fwdNavBtn  = win.querySelector('[data-nav="fwd"]');

            function syncNavBtns() {
                if (backNavBtn) backNavBtn.disabled = iPos <= 0;
                if (fwdNavBtn)  fwdNavBtn.disabled  = iPos >= iHistory.length - 1;
            }
            syncNavBtns();

            /* Record every URL the iframe lands on */
            iframe.addEventListener('load', function () {
                if (progNav) { progNav = false; syncNavBtns(); return; }
                try {
                    var url = iframe.contentWindow.location.href;
                    /* Trim any forward entries when the user navigated to a new page */
                    iHistory = iHistory.slice(0, iPos + 1);
                    iHistory.push(url);
                    iPos = iHistory.length - 1;
                } catch (_) {}
                syncNavBtns();
            });

            win.querySelectorAll('.mac-nav-btn[data-nav]').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (btn.dataset.nav === 'back' && iPos > 0) {
                        progNav = true;
                        iPos--;
                        iframe.src = iHistory[iPos];
                    }
                    if (btn.dataset.nav === 'fwd' && iPos < iHistory.length - 1) {
                        progNav = true;
                        iPos++;
                        iframe.src = iHistory[iPos];
                    }
                    if (btn.dataset.nav === 'reload') {
                        try { iframe.contentWindow.location.reload(); } catch (_) {}
                    }
                });
            });

            /* "Open in new tab" — uses live iframe location, falls back to history stack */
            var openTabBtn = win.querySelector('.mac-open-tab-btn');
            if (openTabBtn) {
                openTabBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var url;
                    try { url = iframe.contentWindow.location.href; } catch (_) {}
                    if (!url || url === 'about:blank') {
                        url = iHistory[iPos] || win.dataset.src || '';
                    }
                    if (url) window.open(url, '_blank', 'noopener,noreferrer');
                });
            }
        }

        /* Drag (document-level listeners — see comment in previous version) */
        win.addEventListener('pointerdown', function (e) {
            if (e.target.closest('.mac-window-body, .mac-preview-toolbar')) return;
            if (win.classList.contains('is-maximized')) return;

            if (!win.dataset.posResolved) resolvePos();

            sx = e.clientX; sy = e.clientY;
            sl = win.offsetLeft; st = win.offsetTop;
            var moved = false;
            bringToFront(win);

            if (!e.target.closest('.mac-btn, .mac-nav-btn, .mac-urlbar-pill, .mac-open-tab-btn, .mac-titlebar-right')) {
                e.preventDefault();
            }

            function onMove(ev) {
                var dx = ev.clientX - sx, dy = ev.clientY - sy;
                if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
                if (moved) {
                    win.style.left = (sl + dx) + 'px';
                    win.style.top  = (st + dy) + 'px';
                }
            }
            function onUp() {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup',  onUp);
                if (moved) {
                    win.dataset.moved = '1';
                    win.addEventListener('click', function h(ev) {
                        ev.stopPropagation();
                        ev.preventDefault();
                    }, { capture: true, once: true });
                }
            }
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup',  onUp);
        });
    }

    /* Init all static windows */
    document.querySelectorAll('.mac-window').forEach(initWindow);

    /* ── Finder grid ────────────────────────────────────────── */

    /* ── Image Preview windows ───────────────────────────────── */

    /**
     * Create and open an independent Preview window.
     *
     * @param {Array}  images    [{src, name, dl?, filename?}]
     * @param {number} startIdx  image to show first
     *
     * Each call spawns its own window.  Multiple can be open at once.
     * Dynamic windows are removed from the DOM when closed.
     */
    function openPreviewWindow(images, startIdx) {
        var id  = 'win-preview-' + Date.now();
        var win = buildWindow({ id: id, type: 'preview', title: '' });
        win.dataset.dynamic = '1';
        document.body.appendChild(win);
        initWindow(win);

        var idx = ((startIdx % images.length) + images.length) % images.length;

        var imgEl     = win.querySelector('img.mac-preview-img');
        var videoEl   = win.querySelector('video.mac-preview-img');
        var titleEl   = win.querySelector('.mac-window-title');
        var counterEl = win.querySelector('.mac-preview-counter');
        var toolbar   = win.querySelector('.mac-preview-toolbar');
        var dlEl      = win.querySelector('.mac-preview-dl');
        var prevBtn   = win.querySelector('[aria-label="Previous image"]');
        var nextBtn   = win.querySelector('[aria-label="Next image"]');

        function setImage(i, dir) {
            idx = ((i % images.length) + images.length) % images.length;
            var im     = images[idx];
            var isVid  = /\.(webm|mp4)$/i.test(im.src || '');

            if (isVid && videoEl) {
                /* Video: swap to <video> element */
                imgEl.hidden   = true;
                videoEl.src    = im.src;
                videoEl.hidden = false;
                videoEl.load();
            } else {
                /* Image: hide video, slide-animate the <img> */
                if (videoEl) { videoEl.hidden = true; videoEl.src = ''; }
                imgEl.classList.remove('img-slide-next', 'img-slide-prev');
                void imgEl.offsetWidth; /* reflow so animation restarts */
                if (dir !== 0) imgEl.classList.add(dir > 0 ? 'img-slide-next' : 'img-slide-prev');
                imgEl.src    = im.src;
                imgEl.alt    = im.name;
                imgEl.hidden = false;
            }

            if (titleEl)   titleEl.textContent   = im.name;
            if (counterEl) counterEl.textContent = images.length > 1
                ? (idx + 1) + ' / ' + images.length : '';

            /* Toolbar: show only when a download target exists */
            if (toolbar) {
                var hasDl = !!(im.dl);
                toolbar.hidden = !hasDl;
                if (hasDl && dlEl) {
                    dlEl.href = im.dl;
                    dlEl.setAttribute('download', im.filename || '');
                }
            }

            /* Show/hide nav */
            var showNav = images.length > 1;
            if (prevBtn) prevBtn.style.display = showNav ? '' : 'none';
            if (nextBtn) nextBtn.style.display = showNav ? '' : 'none';
        }

        if (prevBtn) prevBtn.addEventListener('click', function (e) { e.stopPropagation(); setImage(idx - 1, -1); });
        if (nextBtn) nextBtn.addEventListener('click', function (e) { e.stopPropagation(); setImage(idx + 1,  1); });

        /* Keyboard nav */
        win.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowLeft')  setImage(idx - 1, -1);
            if (e.key === 'ArrowRight') setImage(idx + 1,  1);
        });

        /* Touch swipe */
        var tx = 0;
        win.addEventListener('touchstart', function (e) { tx = e.changedTouches[0].clientX; }, { passive: true });
        win.addEventListener('touchend',   function (e) {
            var dx = e.changedTouches[0].clientX - tx;
            if (Math.abs(dx) > 50) setImage(idx + (dx < 0 ? 1 : -1), dx < 0 ? 1 : -1);
        }, { passive: true });

        setImage(startIdx, 0);
        openMacWin(id);
    }

    /* Convenience wrappers used by icon click handlers */
    function openPreview(index) {
        openPreviewWindow(
            WALLPAPERS.map(function (wp) {
                return { src: wp.thumb, name: wp.filename, dl: wp.full, filename: wp.filename };
            }),
            index
        );
    }

    function openSinglePreview(src, name) {
        openPreviewWindow([{ src: src, name: name }], 0);
    }

    /* ── Desktop icon drag + click system ──────────────────── */
    var LabIcons = (function () {
        var STORE = 'lab-icon-pos';

        function loadPos() {
            try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; }
        }
        function savePos(id, x, y) {
            var pos = loadPos();
            pos[id] = { x: x, y: y };
            localStorage.setItem(STORE, JSON.stringify(pos));
        }

        function setupIcon(icon) {
            var id    = icon.dataset.iconId;
            var saved = loadPos();
            var pinLoad = icon.dataset.pinLoad;

            /* Pinned props always start top-left on load — skip saved position */
            if (pinLoad === 'top-left') {
                pinAirpodsTopLeft(icon);
            } else if (saved[id]) {
                var vw = window.innerWidth, vh = window.innerHeight;
                if (saved[id].x < vw - 20 && saved[id].y < vh - 20) {
                    icon.style.left = saved[id].x + 'px';
                    icon.style.top  = saved[id].y + 'px';
                }
            }

            var dragging = false, moved = false, wasDragged = false;
            var startX, startY, startL, startT;

            icon.addEventListener('pointerdown', function (e) {
                if (e.button !== 0) return;
                dragging = true; moved = false;
                startX = e.clientX; startY = e.clientY;
                startL = icon.offsetLeft; startT = icon.offsetTop;
                icon.setPointerCapture(e.pointerId);
                icon.style.zIndex = '10';
            });

            icon.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var dx = e.clientX - startX, dy = e.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { moved = true; wasDragged = true; }
                if (moved) {
                    icon.style.left = (startL + dx) + 'px';
                    icon.style.top  = (startT + dy) + 'px';
                    e.preventDefault();
                }
            });

            icon.addEventListener('pointerup', function () {
                if (!dragging) return;
                dragging = false; icon.style.zIndex = '';
                if (moved && icon.dataset.pinLoad !== 'top-left') {
                    savePos(id, icon.offsetLeft, icon.offsetTop);
                }
            });

            function activateIcon() {
                if (icon.dataset.previewSrc) {
                    if (icon.dataset.previewType === 'video') {
                        openPreviewWindow([{ src: icon.dataset.previewSrc, name: icon.dataset.previewName || '' }], 0);
                    } else {
                        openSinglePreview(icon.dataset.previewSrc, icon.dataset.previewName || '');
                    }
                } else if (icon.dataset.window) {
                    openMacWin(icon.dataset.window);
                } else if (icon.dataset.href) {
                    window.location.href = icon.dataset.href;
                }
            }

            icon.addEventListener('click', function () {
                if (wasDragged) { wasDragged = false; return; }
                activateIcon();
            });

            icon.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                activateIcon();
            });
        }

        /* Init all icons already in the DOM */
        document.querySelectorAll('.lab-desktop-icon[data-icon-id]').forEach(setupIcon);

        return { setup: setupIcon };
    })();

    /* ── Auto-populate desktop from images/lab-images/manifest.json ── */
    (function loadLabImages() {
        var COLS      = [9, 34, 59, 84];  /* % left — 4 columns            */
        var ROW_START = 75;               /* % top of first auto-icon row   */
        var ROW_STEP  = 18;               /* % between rows                 */
        var desktop   = document.getElementById('lab-main');

        fetch('/images/lab-images/manifest.json')
            .then(function (r) { return r.json(); })
            .then(function (entries) { entries.forEach(createIcon); layoutMobileItems(); })
            .catch(function () { layoutMobileItems(); /* manifest missing — still lay out */ });

        function createIcon(entry, i) {
            var isVid = entry.type === 'video';
            var src   = '/images/lab-images/' + entry.file;
            var id    = 'lab-img-' + entry.file.replace(/[^a-z0-9]/gi, '-').toLowerCase();

            var icon = document.createElement('div');
            icon.className = 'lab-desktop-icon';
            icon.dataset.iconId      = id;
            icon.dataset.previewSrc  = src;
            icon.dataset.previewName = entry.name;
            if (isVid) icon.dataset.previewType = 'video';
            icon.tabIndex = 0;
            icon.setAttribute('role', 'button');
            icon.setAttribute('aria-label', entry.name);
            /* Curated default positions per file — LabIcons.setup() overrides with any saved position */
            var DEFAULT_POS = {
                'App icon03.jpg':         { left: 59, top: 17 },
                'hubiyan.jpg':            { left: 68, top: 60 },
                'shawarma-and-karak.jpg': { left: 40, top: 65 },
                'airpods_wired.png':      { left: 46, top: 84 }
            };
            var dp = DEFAULT_POS[entry.file];
            if (dp) {
                icon.style.left = dp.left + '%';
                icon.style.top  = dp.top + '%';
            } else {
                icon.style.left = COLS[i % COLS.length] + '%';
                icon.style.top  = (ROW_START + Math.floor(i / COLS.length) * ROW_STEP) + '%';
            }

            /* Thumbnail */
            var figure = document.createElement('div');
            figure.className = 'lab-icon-figure';
            var thumb;
            if (isVid) {
                thumb = document.createElement('video');
                thumb.src      = src;
                thumb.autoplay = true;
                thumb.loop     = true;
                thumb.muted    = true;
                thumb.setAttribute('playsinline', '');
            } else {
                thumb = document.createElement('img');
                thumb.src     = src;
                thumb.alt     = entry.name;
                thumb.loading = 'lazy';
            }
            thumb.width  = 78;
            thumb.height = 78;
            thumb.style.cssText = 'height:78px;width:78px;object-fit:cover;border-radius:10px;' +
                                  'filter:drop-shadow(0 4px 12px rgba(0,0,0,0.45))';
            figure.appendChild(thumb);
            icon.appendChild(figure);

            var label = document.createElement('span');
            label.className   = 'lab-icon-label';
            label.textContent = entry.name;
            icon.appendChild(label);

            LabIcons.setup(icon);
            desktop.appendChild(icon);
        }
    })();

    /* ── Learning video card config ─────────────────────────── */
    var LEARNING_VIDEO = {

    function youtubeUrlToId(url) {
        if (!url) return '';
        var match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|watch\?v=|shorts\/))([A-Za-z0-9_-]{11})/);
        return match ? match[1] : '';
    }

    function buildLearningEmbedSrc(cfg, autoplay) {
        var id = cfg.youtubeId || youtubeUrlToId(cfg.youtubeUrl);
        if (!id) return '';
        var params = cfg.embedParams || 'controls=0';
        if (autoplay) params += '&autoplay=1';
        return 'https://www.youtube.com/embed/' + id + '?' + params;
    }

    function buildYoutubeThumbSrc(id) {
        return 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';

    /* ── Casio F-91W watch ──────────────────────────────────── */
    (function initCasioWatch() {
        var root = document.getElementById('lab-casio');
        if (!root) return;

        var lcd = document.getElementById('lab-casio-lcd');
        var lightBtn = document.getElementById('lab-casio-light-btn');
        var modeBtn = document.getElementById('lab-casio-mode-btn');
        var dayEl = root.querySelector('.day');
        var weekdayEl = root.querySelector('.weekday');
        var hoursEl = root.querySelector('.hours');
        var minutesEl = root.querySelector('.minutes');
        var secondsEl = root.querySelector('.seconds');
        var WEEKDAY = ['SU', 'MO', 'TU', 'WE', 'TH', 'FR', 'SA'];

        function updateClock() {
            var date = new Date();
            if (dayEl) dayEl.textContent = date.getDate();
            if (weekdayEl) weekdayEl.textContent = WEEKDAY[date.getDay()];
            if (hoursEl) hoursEl.textContent = String(date.getHours()).padStart(2, '0');
            if (minutesEl) minutesEl.textContent = String(date.getMinutes()).padStart(2, '0');
            if (secondsEl) secondsEl.textContent = String(date.getSeconds()).padStart(2, '0');
        }

        updateClock();
        setInterval(updateClock, 1000);

        if (lightBtn && lcd) {
            function lightOn() { lcd.classList.add('is-lit'); }
            function lightOff() { lcd.classList.remove('is-lit'); }
            lightBtn.addEventListener('mousedown', lightOn);
            lightBtn.addEventListener('mouseup', lightOff);
            lightBtn.addEventListener('mouseleave', lightOff);
            lightBtn.addEventListener('touchstart', function (e) {
                e.preventDefault();
                lightOn();
            }, { passive: false });
            lightBtn.addEventListener('touchend', lightOff);
            lightBtn.addEventListener('touchcancel', lightOff);
        }

        if (modeBtn) {
            modeBtn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                window.open('https://codepen.io/manz/pen/KKWmWLb', '_blank', 'noopener,noreferrer');
            });
        }
    })();

    /* ── Lamp power switch ──────────────────────────────────── */
    (function initLampSwitch() {
        var btn  = document.getElementById('lab-power-btn');
        var lamp = document.querySelector('.lab-lamp');
        if (!btn || !lamp) return;

        function setOn(on) {
            lamp.classList.toggle('is-off', !on);
            btn.classList.toggle('is-on', on);
            btn.setAttribute('aria-pressed', String(on));
        }

        btn.addEventListener('click', function () {
            setOn(!btn.classList.contains('is-on'));
        });
    })();

    /* ── Desktop widget drag system ─────────────────────────── */
    var LabWidgets = (function () {
        var STORE = 'lab-widget-pos';

        function loadPos() {
            try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; }
        }

        function savePos(id, x, y) {
            var pos = loadPos();
            pos[id] = { x: x, y: y };
            localStorage.setItem(STORE, JSON.stringify(pos));
        }

        function clampToViewport(widget) {
            var vw   = window.innerWidth;
            var vh   = window.innerHeight;
            var rect = widget.getBoundingClientRect();
            var left = widget.offsetLeft;
            var top  = widget.offsetTop;
            var pad  = 8;
            var maxL = Math.max(pad, vw - rect.width - pad);
            var maxT = Math.max(pad, vh - rect.height - pad);

            if (left > maxL) left = maxL;
            if (top  > maxT) top  = maxT;
            if (left < pad)  left = pad;
            if (top  < pad)  top  = pad;

            widget.style.left = left + 'px';
            widget.style.top  = top  + 'px';
        }

        function setupWidget(widget) {
            var id     = widget.dataset.widgetId;
            var minBtn = widget.querySelector('.lab-learning-card__min-btn');

            function toggleMinimized() {
                var min = widget.classList.toggle('is-minimized');
                if (minBtn) {
                    minBtn.setAttribute('aria-expanded', String(!min));
                    minBtn.setAttribute('aria-label',
                        min ? 'Maximise video card' : 'Minimise video card');
                }
                clampToViewport(widget);
                /* re-clamp once the size transition finishes */
                setTimeout(function () { clampToViewport(widget); }, 380);
            }

            var saved = loadPos();
            if (saved[id]) {
                var vw = window.innerWidth;
                var vh = window.innerHeight;
                if (saved[id].x < vw - 20 && saved[id].y < vh - 20) {
                    widget.style.left = saved[id].x + 'px';
                    widget.style.top  = saved[id].y + 'px';
                }
            }

            requestAnimationFrame(function () { clampToViewport(widget); });

            var dragging = false;
            var moved    = false;
            var startX, startY, startL, startT;

            function onMove(e) {
                if (!dragging) return;
                var dx = e.clientX - startX;
                var dy = e.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
                if (moved) {
                    widget.style.left = (startL + dx) + 'px';
                    widget.style.top  = (startT + dy) + 'px';
                    e.preventDefault();
                }
            }

            function onUp() {
                window.removeEventListener('pointermove', onMove);
                window.removeEventListener('pointerup', onUp);
                if (!dragging) return;
                dragging = false;
                widget.style.zIndex = '';
                widget.classList.remove('is-grabbing');
                /* flag read by child click handlers to suppress taps after a drag */
                widget.dataset.dragged = moved ? '1' : '';
                if (moved) {
                    clampToViewport(widget);
                    savePos(id, widget.offsetLeft, widget.offsetTop);
                }
            }

            /* Drag from anywhere on the widget — except Casio buttons */
            widget.addEventListener('pointerdown', function (e) {
                if (e.button !== 0) return;
                if (e.target.closest('.casio-f91w .button')) return;
                dragging = true;
                moved    = false;
                widget.dataset.dragged = '';
                startX   = e.clientX;
                startY   = e.clientY;
                startL   = widget.offsetLeft;
                startT   = widget.offsetTop;
                widget.style.zIndex = '10';
                widget.classList.add('is-grabbing');
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            });

            /* Tap on the button toggles min/max (ignored right after a drag) */
            if (minBtn) {
                minBtn.addEventListener('click', function () {
                    if (widget.dataset.dragged === '1') return;
                    toggleMinimized();
                });
            }

            window.addEventListener('resize', function () { clampToViewport(widget); });
        }

        document.querySelectorAll('[data-widget-id]').forEach(setupWidget);

        return { setup: setupWidget };
    })();

    /* ── Mobile load layout — stack items vertically, no overlap ───
       On phones the desktop's percentage positions overlap, so on load
       we pin the learning card top-right and lay every icon out in a
       single non-overlapping vertical run the user can scroll through.
       Positions are memoised per id so repeat calls don't reshuffle.   */
    var mobilePos = {};

    function pinPowerTopLeft() {
        var power = document.getElementById('lab-power-btn');
        if (!power) return;
        var pad = window.matchMedia('(max-width: 520px)').matches ? 16 : 24;
        power.style.left = pad + 'px';
        power.style.top  = pad + 'px';
        return power;
    }

    function pinAirpodsTopLeft(el) {
        var airpods = el || document.getElementById('lab-airpods');
        if (!airpods) return;
        var mobile = window.matchMedia('(max-width: 520px)').matches;
        var pad = mobile ? 16 : 24;
        var power = document.getElementById('lab-power-btn');
        var offset = power ? power.offsetWidth + (mobile ? 12 : 20) : 0;
        airpods.style.left = (pad + offset) + 'px';
        airpods.style.top  = pad + 'px';
        return airpods;
    }

    function layoutMobileItems() {
        if (!window.matchMedia('(max-width: 520px)').matches) {
            pinPowerTopLeft();
            return;
        }
        var main = document.getElementById('lab-main');
        if (!main) return;

        var vw  = window.innerWidth;
        var pad = 16;
        var y   = pad;

        var power = pinPowerTopLeft();
        if (power) {
            y = Math.max(y, power.offsetTop + power.offsetHeight + 24);
        }

        var casio = document.getElementById('lab-casio');
        if (casio) {
            var casioW = casio.offsetWidth;
            var casioMaxL = Math.max(pad, vw - casioW - pad);
            if (!mobilePos['casio-watch']) {
                mobilePos['casio-watch'] = { leftRatio: 0.15, gap: 20 };
            }
            var cp = mobilePos['casio-watch'];
            casio.style.left = (pad + cp.leftRatio * (casioMaxL - pad)) + 'px';
            casio.style.top  = y + 'px';
            y = Math.max(y, casio.offsetTop + casio.offsetHeight + cp.gap);
        }

        var card = document.getElementById('lab-learning-card');
        if (card) {
            var cardW = card.offsetWidth;
            card.style.left = Math.max(pad, vw - cardW - pad) + 'px';
            card.style.top  = pad + 'px';
            y = Math.max(y, card.offsetTop + card.offsetHeight + 24);
        }

        var icons = Array.prototype.slice.call(
            document.querySelectorAll('.lab-desktop-icon')
        );
        /* Deterministic zig-zag scatter — keeps a desktop-like feel while
           guaranteeing no overlap in a single vertical run on phones. */
        var LEFT_RATIOS = [0.5, 0.08, 0.82, 0.32, 0.66, 0.16, 0.9];
        icons.forEach(function (icon, i) {
            var key     = icon.dataset.iconId || ('static-' + i);
            var w       = icon.offsetWidth;
            var h       = icon.offsetHeight;
            var maxLeft = Math.max(pad, vw - w - pad);
            if (!mobilePos[key]) {
                mobilePos[key] = {
                    leftRatio: LEFT_RATIOS[i % LEFT_RATIOS.length],
                    gap:       22
                };
            }
            var p = mobilePos[key];
            icon.style.left = (pad + p.leftRatio * (maxLeft - pad)) + 'px';
            icon.style.top  = y + 'px';
            y += h + p.gap;
        });

        main.style.minHeight = Math.max(window.innerHeight, y + 40) + 'px';
    }

    /* The learning card starts expanded on all breakpoints. */

    layoutMobileItems();
    window.addEventListener('load', layoutMobileItems);
    </script>
</body>
