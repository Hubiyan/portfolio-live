    <!-- Shared SVG paint servers — box icon gradients/grain pattern -->
    <svg style="display:none;position:absolute" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="box-front-shade" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.11)"/>
                <stop offset="28%"  stop-color="rgba(255,255,255,0)"/>
                <stop offset="100%" stop-color="rgba(100,58,20,0.10)"/>
            </linearGradient>
            <linearGradient id="box-top-shade" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
            </linearGradient>
            <linearGradient id="box-side-shade" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="rgba(0,0,0,0.03)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
            </linearGradient>
            <pattern id="box-grain" x="0" y="0" width="9" height="240"
                     patternUnits="userSpaceOnUse">
                <line x1="0.4" y1="0" x2="0.4" y2="240"
                      stroke="rgba(90,52,18,0.055)" stroke-width="0.6"/>
            </pattern>
        </defs>
    </svg>

    <script>
    /* ── Colour switcher ────────────────────────────────────── */
    (function () {
        var body     = document.body;
        var swatches = document.querySelectorAll('.lab-swatch');
        var saved    = localStorage.getItem('lab-mat-color');
        if (saved) {
            body.setAttribute('data-mat-color', saved);
            swatches.forEach(function (s) {
                s.setAttribute('aria-pressed', s.dataset.color === saved ? 'true' : 'false');
            });
        }
        swatches.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var color = btn.dataset.color;
                body.setAttribute('data-mat-color', color);
                localStorage.setItem('lab-mat-color', color);
                swatches.forEach(function (s) {
                    s.setAttribute('aria-pressed', s.dataset.color === color ? 'true' : 'false');
                });
            });
        });
    })();

            filename: 'Andromeda-horizon.png'

            filename: 'Andromeda-horizon-2.png'

    /* ── macOS Window system ────────────────────────────────── */
    var macZCounter      = 60;
    var finderPopulated  = false;

    function bringToFront(win) {
        macZCounter += 1;
        win.style.zIndex = String(macZCounter);
    }

    /**
     * Open a .mac-window with the open animation.
     * Iframes are lazy-loaded on first open.
     * The Finder grid is populated on first open.
     */
    function openMacWin(id) {
        var win = document.getElementById(id);
        if (!win) return;

        /* Reset animation state */
        win.classList.remove('is-closing', 'is-minimizing');
        win.hidden = false;
        void win.offsetWidth; /* force reflow so animation restarts cleanly */
        win.classList.add('is-opening');
        win.addEventListener('animationend', function () {
            win.classList.remove('is-opening');
        }, { once: true });

        bringToFront(win);

        /* Lazy-load iframe */
        var iframe = win.querySelector('.mac-window-iframe');
        if (iframe && !iframe.getAttribute('src')) {
            iframe.src = win.dataset.src;

            /* Keep URL bar in sync as user navigates inside */
            var urlText = win.querySelector('.mac-urlbar-text');
            if (urlText) {
                iframe.addEventListener('load', function () {
                    try {
                        var href = iframe.contentWindow.location.href;
                        urlText.textContent = href.replace(/^https?:\/\//, '');
                    } catch (_) {}
                });
            }
        }

        /* Populate Finder grid once */
        if (id === 'win-visual' && !finderPopulated) {
            populateFinderGrid();
        }
    }

    /**
     * Close with the close animation, then set hidden.
     */
    function closeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-closing');
        /* Timeout fallback in case animationend doesn't fire */
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-closing');
            win.hidden = true;
        }
    }

    /**
     * Minimise with a shrink-down animation.
     */
    function minimizeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-minimizing');
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-minimizing');
            win.hidden = true;
        }
    }

    /* Wire each window's controls + drag */
    document.querySelectorAll('.mac-window').forEach(function (win) {
        var resolved = false; /* has % transform been resolved to px? */
        var sx, sy, sl, st;

        /* ── Traffic lights ── */
        var btnClose = win.querySelector('.mac-btn--close');
        var btnMax   = win.querySelector('.mac-btn--max');

        if (btnClose) btnClose.addEventListener('click', function (e) {
            e.stopPropagation();
            closeMacWin(win);
        });
        if (btnMax) btnMax.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!resolved) resolvePos();
            win.classList.add('is-resizing');
            win.classList.toggle('is-maximized');
            win.addEventListener('transitionend', function () {
                win.classList.remove('is-resizing');
            }, { once: true });
        });

        /* ── iframe nav (back / forward / reload) ── */
        win.querySelectorAll('.mac-nav-btn[data-nav]').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var iframe = win.querySelector('.mac-window-iframe');
                if (!iframe) return;
                try {
                    if (btn.dataset.nav === 'back')   iframe.contentWindow.history.back();
                    if (btn.dataset.nav === 'fwd')    iframe.contentWindow.history.forward();
                    if (btn.dataset.nav === 'reload') iframe.contentWindow.location.reload();
                } catch (_) {}
            });
        });

        function resolvePos() {
            var r = win.getBoundingClientRect();
            win.style.left      = r.left + 'px';
            win.style.top       = r.top  + 'px';
            win.style.transform = 'none';
            resolved = true;
        }

        /*
         * ── Window drag ───────────────────────────────────────────
         *
         * We do NOT use setPointerCapture because that re-routes pointerup
         * to the capture element, breaking the browser's click synthesis on
         * child buttons.  Instead we attach document-level move/up listeners
         * so the drag keeps working even when the pointer leaves the window,
         * and buttons receive their own pointerup → click as normal.
         *
         * If the pointer moves > 4 px we enter drag mode and install a
         * one-shot capture-phase click-canceller so dragging over a button
         * doesn't accidentally fire it.
         */
        win.addEventListener('pointerdown', function (e) {
            /* Only drag from the chrome (titlebar area), not content */
            if (e.target.closest('.mac-window-body, .mac-preview-toolbar')) return;
            if (win.classList.contains('is-maximized')) return;

            if (!resolved) resolvePos();

            sx = e.clientX; sy = e.clientY;
            sl = win.offsetLeft; st = win.offsetTop;
            var moved = false;
            bringToFront(win);

            /* Don't eat the event for plain non-button clicks */
            if (!e.target.closest('.mac-btn, .mac-nav-btn, .mac-urlbar-pill,\
                                    .mac-titlebar-right')) {
                e.preventDefault();
            }

            function onMove(ev) {
                var dx = ev.clientX - sx, dy = ev.clientY - sy;
                if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
                if (moved) {
                    win.style.left = (sl + dx) + 'px';
                    win.style.top  = (st + dy) + 'px';
                }
            }
            function onUp() {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup',  onUp);
                if (moved) {
                    /* Swallow the click that would fire on a button we dragged from */
                    win.addEventListener('click', function h(ev) {
                        ev.stopPropagation();
                        ev.preventDefault();
                    }, { capture: true, once: true });
                }
            }
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup',  onUp);
        });
    });

    /* ── Finder grid ────────────────────────────────────────── */
    function populateFinderGrid() {
        var grid = document.getElementById('finder-wallpapers');
        WALLPAPERS.forEach(function (wp, i) {
            var btn = document.createElement('button');
            btn.className = 'mac-finder-thumb';
            btn.setAttribute('aria-label', wp.name);

            var img    = document.createElement('img');
            img.src    = wp.thumb;
            img.alt    = wp.name;
            img.width  = 120;
            img.height = 213;
            img.loading = 'lazy';
            img.style.height = 'auto';

            var lbl = document.createElement('span');
            lbl.textContent = wp.name;

            btn.appendChild(img);
            btn.appendChild(lbl);
            btn.addEventListener('click', function () { openPreview(i); });
            grid.appendChild(btn);
        });
        finderPopulated = true;
    }

    /* ── Image Preview (macOS Preview-style window) ─────────── */
    var previewIdx = 0;

    function openPreview(index) {
        previewIdx = (index + WALLPAPERS.length) % WALLPAPERS.length;
        var wp = WALLPAPERS[previewIdx];

        document.getElementById('preview-img').src     = wp.thumb;
        document.getElementById('preview-img').alt     = wp.name;
        document.getElementById('preview-title').textContent   = wp.name;
        document.getElementById('preview-counter').textContent =
            (previewIdx + 1) + ' / ' + WALLPAPERS.length;

        var dl = document.getElementById('preview-dl');
        dl.href = wp.full;
        dl.setAttribute('download', wp.filename);

        /* Show / hide nav if only one image */
        var showNav = WALLPAPERS.length > 1;
        document.getElementById('preview-prev').style.display = showNav ? '' : 'none';
        document.getElementById('preview-next').style.display = showNav ? '' : 'none';

        openMacWin('win-preview');
    }

    document.getElementById('preview-prev').addEventListener('click', function (e) {
        e.stopPropagation();
        openPreview(previewIdx - 1);
    });
    document.getElementById('preview-next').addEventListener('click', function (e) {
        e.stopPropagation();
        openPreview(previewIdx + 1);
    });

    /* Keyboard nav inside the preview window */
    document.getElementById('win-preview').addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft')  openPreview(previewIdx - 1);
        if (e.key === 'ArrowRight') openPreview(previewIdx + 1);
    });

    /* Swipe for preview on touch */
    (function () {
        var tx = 0;
        var pw = document.getElementById('win-preview');
        pw.addEventListener('touchstart', function (e) {
            tx = e.changedTouches[0].clientX;
        }, { passive: true });
        pw.addEventListener('touchend', function (e) {
            var dx = e.changedTouches[0].clientX - tx;
            if (Math.abs(dx) > 50) openPreview(previewIdx + (dx < 0 ? 1 : -1));
        }, { passive: true });
    })();

    /* ── Desktop icon drag + click system ──────────────────── */
    (function initDesktopIcons() {
        var STORE = 'lab-icon-pos';
        var isMobile = window.matchMedia('(max-width: 520px)').matches;

        function loadPos() {
            try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; }
        }
        function savePos(id, x, y) {
            var pos = loadPos();
            pos[id] = { x: x, y: y };
            localStorage.setItem(STORE, JSON.stringify(pos));
        }

        var saved = isMobile ? {} : loadPos();

        document.querySelectorAll('.lab-desktop-icon[data-icon-id]').forEach(function (icon) {
            var id = icon.dataset.iconId;

            /* Restore saved desktop position (skip on mobile — CSS handles layout) */
            if (!isMobile && saved[id]) {
                icon.style.left = saved[id].x + 'px';
                icon.style.top  = saved[id].y + 'px';
            }

            /* Drag is desktop-only */
            if (isMobile) {
                icon.addEventListener('click', function () {
                    if (icon.dataset.window) openMacWin(icon.dataset.window);
                    else if (icon.dataset.href) window.location.href = icon.dataset.href;
                });
                icon.addEventListener('keydown', function (e) {
                    if (e.key !== 'Enter' && e.key !== ' ') return;
                    e.preventDefault();
                    if (icon.dataset.window) openMacWin(icon.dataset.window);
                });
                return;
            }

            var dragging = false, moved = false, wasDragged = false;
            var startX, startY, startL, startT;

            icon.addEventListener('pointerdown', function (e) {
                if (e.button !== 0) return;
                dragging = true; moved = false;
                startX = e.clientX; startY = e.clientY;
                startL = icon.offsetLeft; startT = icon.offsetTop;
                icon.setPointerCapture(e.pointerId);
                icon.style.zIndex = '10';
            });

            icon.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var dx = e.clientX - startX, dy = e.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { moved = true; wasDragged = true; }
                if (moved) {
                    icon.style.left = (startL + dx) + 'px';
                    icon.style.top  = (startT + dy) + 'px';
                    e.preventDefault();
                }
            });

            icon.addEventListener('pointerup', function () {
                if (!dragging) return;
                dragging = false; icon.style.zIndex = '';
                if (moved) savePos(id, icon.offsetLeft, icon.offsetTop);
            });

            icon.addEventListener('click', function () {
                if (wasDragged) { wasDragged = false; return; }
                if (icon.dataset.window) openMacWin(icon.dataset.window);
                else if (icon.dataset.href) window.location.href = icon.dataset.href;
            });

            icon.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                if (icon.dataset.window) openMacWin(icon.dataset.window);
                else if (icon.dataset.href) window.location.href = icon.dataset.href;
            });
        });
    })();
    </script>
