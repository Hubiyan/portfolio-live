    <!-- ── Colour switcher ───────────────────────────────────── -->

    <script>
    /* ── Colour switcher ────────────────────────────────────── */
    (function () {
        var body     = document.body;
        var swatches = document.querySelectorAll('.lab-swatch');
        var saved    = localStorage.getItem('lab-mat-color');
        if (saved) {
            body.setAttribute('data-mat-color', saved);
            swatches.forEach(function (s) {
                s.setAttribute('aria-pressed', s.dataset.color === saved ? 'true' : 'false');
            });
        }
        swatches.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var color = btn.dataset.color;
                body.setAttribute('data-mat-color', color);
                localStorage.setItem('lab-mat-color', color);
                swatches.forEach(function (s) {
                    s.setAttribute('aria-pressed', s.dataset.color === color ? 'true' : 'false');
                });
            });
        });
    })();

    /* ── Wallpaper data ─────────────────────────────────────── */
    var WALLPAPERS = [
        {
            name:     'Andromeda Horizon',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon.png',
            filename: 'Andromeda-horizon.png'
        },
        {
            name:     'Andromeda Horizon No.1',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon-1.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-1.png',
            filename: 'Andromeda-horizon-1.png'
        },
        {
            name:     'Andromeda Horizon No.2',
            thumb:    '/images/wallpapers/thumbs/Andromeda-horizon-2.webp',
            full:     'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-2.png',
            filename: 'Andromeda-horizon-2.png'
        }
    ];

    /* ═══════════════════════════════════════════════════════════
       macOS Window component builder
       ═══════════════════════════════════════════════════════════
       To add a new window, append one entry to WIN_CONFIGS below.
       Types:  'browser'  → iframe + URL bar
               'finder'   → grid body + centered title
               'preview'  → image body + optional download toolbar
    ═══════════════════════════════════════════════════════════ */

    /* Shared SVG icon strings */
    var SVG_ICONS = {
        chevL:    '<svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M8 1L2 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        chevR:    '<svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        reload:   '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 2.5 A4.5 4.5 0 1 1 2.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/><polyline points="1,5.5 2.5,7 4,5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
        lock:     '<svg class="mac-urlbar-lock" width="9" height="12" viewBox="0 0 9 12" fill="none" aria-hidden="true"><rect x="1" y="5.5" width="7" height="6" rx="1.2" fill="currentColor"/><path d="M2.5 5.5V3.8a2 2 0 014 0v1.7" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>',
        download: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 1v8M4 6l2.5 3 2.5-3M1.5 11.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    /* Window registry — add entries here to create new windows */
    var WIN_CONFIGS = [
        { id: 'win-prompts',  type: 'browser',  title: 'Prompts',             src: '/lab/prompts/',         urlLabel: 'hubiyan.com/lab/prompts/' },
        { id: 'win-ai-bro',   type: 'browser',  title: 'AI Bro Detector',     src: '/lab/ai-bro-detector/', urlLabel: 'hubiyan.com/lab/ai-bro-detector/' },
        { id: 'win-visual',   type: 'finder',   title: 'Visual Explorations' },
        { id: 'win-preview',  type: 'preview',  title: 'Image' }
    ];

    function buildWindow(cfg) {
        var win = document.createElement('div');
        win.className = 'mac-window' + (cfg.type !== 'browser' ? ' mac-window--' + cfg.type : '');
        win.id = cfg.id;
        if (cfg.src) win.dataset.src = cfg.src;
        win.hidden = true;

        /* ── Titlebar ── */
        var bar = document.createElement('div');
        bar.className = 'mac-window-titlebar';

        var ctrl = document.createElement('div');
        ctrl.className = 'mac-window-controls';
        ctrl.innerHTML =
            '<button class="mac-btn mac-btn--close" aria-label="Close"></button>' +
            '<button class="mac-btn mac-btn--max"   aria-label="Maximise"></button>';
        bar.appendChild(ctrl);

        if (cfg.type === 'browser') {
            var urlbar = document.createElement('div');
            urlbar.className = 'mac-window-urlbar';
            urlbar.innerHTML =
                '<button class="mac-nav-btn" data-nav="back"   aria-label="Go back">'    + SVG_ICONS.chevL  + '</button>' +
                '<button class="mac-nav-btn" data-nav="fwd"    aria-label="Go forward">' + SVG_ICONS.chevR  + '</button>' +
                '<button class="mac-nav-btn" data-nav="reload" aria-label="Reload">'     + SVG_ICONS.reload + '</button>' +
                '<div class="mac-urlbar-pill">' +
                    SVG_ICONS.lock +
                    '<span class="mac-urlbar-text" id="' + cfg.id + '-url">' + (cfg.urlLabel || '') + '</span>' +
                '</div>';
            bar.appendChild(urlbar);
        } else {
            var titleEl = document.createElement('span');
            titleEl.className = 'mac-window-title';
            if (cfg.type === 'preview') titleEl.id = 'preview-title';
            titleEl.textContent = cfg.title || '';
            bar.appendChild(titleEl);

            var right = document.createElement('div');
            right.className = 'mac-titlebar-right';
            if (cfg.type === 'preview') {
                right.innerHTML =
                    '<button class="mac-nav-btn" id="preview-prev" aria-label="Previous image">' + SVG_ICONS.chevL + '</button>' +
                    '<span class="mac-preview-counter" id="preview-counter"></span>' +
                    '<button class="mac-nav-btn" id="preview-next" aria-label="Next image">'    + SVG_ICONS.chevR + '</button>';
            }
            bar.appendChild(right);
        }

        win.appendChild(bar);

        /* ── Body ── */
        var body = document.createElement('div');
        body.className = 'mac-window-body';

        if (cfg.type === 'browser') {
            var iframe = document.createElement('iframe');
            iframe.className = 'mac-window-iframe';
            iframe.id    = cfg.id + '-iframe';
            iframe.title = cfg.title || '';
            /* src intentionally omitted — lazy-loaded on first open */
            body.appendChild(iframe);
        } else if (cfg.type === 'finder') {
            var grid = document.createElement('div');
            grid.className = 'mac-finder-grid';
            grid.id = 'finder-wallpapers';
            grid.setAttribute('aria-label', 'Wallpapers');
            body.appendChild(grid);
        } else if (cfg.type === 'preview') {
            var img = document.createElement('img');
            img.className = 'mac-preview-img';
            img.id = 'preview-img';
            img.width = 1; img.height = 1;
            body.appendChild(img);
        }

        win.appendChild(body);

        /* ── Toolbar (preview only — hidden when no download available) ── */
        if (cfg.type === 'preview') {
            var toolbar = document.createElement('div');
            toolbar.className = 'mac-preview-toolbar';
            toolbar.id = 'preview-toolbar';
            toolbar.innerHTML =
                '<span class="mac-preview-counter" id="preview-counter-bar"></span>' +
                '<a class="mac-preview-dl" id="preview-dl" href="" target="_blank" rel="noopener" download="" aria-label="Download">' +
                    SVG_ICONS.download + '<span>Download full resolution</span>' +
                '</a>';
            win.appendChild(toolbar);
        }

        document.body.appendChild(win);
    }

    WIN_CONFIGS.forEach(buildWindow);

    /* ── macOS Window system ────────────────────────────────── */
    var macZCounter      = 60;
    var finderPopulated  = false;

    /* Show / hide the "Close all" button depending on open window count */
    function syncCloseAll() {
        var btn = document.getElementById('close-all-btn');
        if (!btn) return;
        var n = document.querySelectorAll('.mac-window:not([hidden])').length;
        btn.hidden = n < 2;
    }
    document.getElementById('close-all-btn').addEventListener('click', function () {
        document.querySelectorAll('.mac-window:not([hidden])').forEach(function (w) {
            closeMacWin(w);
        });
    });

    function bringToFront(win) {
        macZCounter += 1;
        win.style.zIndex = String(macZCounter);
    }

    /**
     * Open a .mac-window with the open animation.
     * Iframes are lazy-loaded on first open.
     * The Finder grid is populated on first open.
     * On desktop, cascades lower-left off any open unmoved window.
     */
    function openMacWin(id) {
        var win = document.getElementById(id);
        if (!win) return;

        /* ── Reset position + state so each open is fresh ── */
        delete win.dataset.posResolved;
        delete win.dataset.moved;
        win.style.left      = '';
        win.style.top       = '';
        win.style.transform = '';

        /* ── Cascade: offset lower-left off the first open unmoved window (desktop) ── */
        var isMobile = window.matchMedia('(max-width: 520px)').matches;
        if (!isMobile) {
            var anchor = null;
            document.querySelectorAll('.mac-window:not([hidden])').forEach(function (w) {
                if (w !== win && !w.dataset.moved && !anchor) anchor = w;
            });
            if (anchor) {
                var r = anchor.getBoundingClientRect();
                var newLeft = Math.max(20, Math.min(r.left - 28, window.innerWidth  - 300));
                var newTop  = Math.max(20, Math.min(r.top  + 28, window.innerHeight - 200));
                win.style.left      = newLeft + 'px';
                win.style.top       = newTop  + 'px';
                win.style.transform = 'none';
                win.dataset.posResolved = '1';
            }
        }

        /* Reset animation state */
        win.classList.remove('is-closing', 'is-minimizing');
        win.hidden = false;
        void win.offsetWidth; /* force reflow so animation restarts cleanly */
        win.classList.add('is-opening');
        win.addEventListener('animationend', function () {
            win.classList.remove('is-opening');
        }, { once: true });

        bringToFront(win);
        syncCloseAll();

        /* Lazy-load iframe */
        var iframe = win.querySelector('.mac-window-iframe');
        if (iframe && !iframe.getAttribute('src')) {
            iframe.src = win.dataset.src;

            /* Keep URL bar in sync as user navigates inside */
            var urlText = win.querySelector('.mac-urlbar-text');
            if (urlText) {
                iframe.addEventListener('load', function () {
                    try {
                        var href = iframe.contentWindow.location.href;
                        urlText.textContent = href.replace(/^https?:\/\//, '');
                    } catch (_) {}
                });
            }
        }

        /* Populate Finder grid once */
        if (id === 'win-visual' && !finderPopulated) {
            populateFinderGrid();
        }
    }

    /**
     * Close with the close animation, then set hidden.
     */
    function closeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-closing');
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-closing');
            win.hidden = true;
            syncCloseAll();
        }
    }

    /**
     * Minimise with a shrink-down animation.
     */
    function minimizeMacWin(win) {
        if (win.hidden) return;
        win.classList.remove('is-opening');
        win.classList.add('is-minimizing');
        var t = setTimeout(function () { doHide(); }, 300);
        win.addEventListener('animationend', function () {
            clearTimeout(t);
            doHide();
        }, { once: true });
        function doHide() {
            win.classList.remove('is-minimizing');
            win.hidden = true;
            syncCloseAll();
        }
    }

    /* Wire each window's controls + drag */
    document.querySelectorAll('.mac-window').forEach(function (win) {
        /* resolved & moved are stored as data-attributes so openMacWin/closeMacWin can reset them */
        var sx, sy, sl, st;

        /* ── Traffic lights ── */
        var btnClose = win.querySelector('.mac-btn--close');
        var btnMax   = win.querySelector('.mac-btn--max');

        if (btnClose) btnClose.addEventListener('click', function (e) {
            e.stopPropagation();
            closeMacWin(win);
        });
        if (btnMax) btnMax.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!win.dataset.posResolved) resolvePos();
            win.classList.add('is-resizing');
            win.classList.toggle('is-maximized');
            win.addEventListener('transitionend', function () {
                win.classList.remove('is-resizing');
            }, { once: true });
        });

        /* ── iframe nav (back / forward / reload) ── */
        win.querySelectorAll('.mac-nav-btn[data-nav]').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var iframe = win.querySelector('.mac-window-iframe');
                if (!iframe) return;
                try {
                    if (btn.dataset.nav === 'back')   iframe.contentWindow.history.back();
                    if (btn.dataset.nav === 'fwd')    iframe.contentWindow.history.forward();
                    if (btn.dataset.nav === 'reload') iframe.contentWindow.location.reload();
                } catch (_) {}
            });
        });

        function resolvePos() {
            var r = win.getBoundingClientRect();
            win.style.left      = r.left + 'px';
            win.style.top       = r.top  + 'px';
            win.style.transform = 'none';
            win.dataset.posResolved = '1';
        }

        /*
         * ── Window drag ───────────────────────────────────────────
         *
         * We do NOT use setPointerCapture because that re-routes pointerup
         * to the capture element, breaking the browser's click synthesis on
         * child buttons.  Instead we attach document-level move/up listeners
         * so the drag keeps working even when the pointer leaves the window,
         * and buttons receive their own pointerup → click as normal.
         *
         * If the pointer moves > 4 px we enter drag mode and install a
         * one-shot capture-phase click-canceller so dragging over a button
         * doesn't accidentally fire it.
         */
        win.addEventListener('pointerdown', function (e) {
            /* Only drag from the chrome (titlebar area), not content */
            if (e.target.closest('.mac-window-body, .mac-preview-toolbar')) return;
            if (win.classList.contains('is-maximized')) return;

            if (!win.dataset.posResolved) resolvePos();

            sx = e.clientX; sy = e.clientY;
            sl = win.offsetLeft; st = win.offsetTop;
            var moved = false;
            bringToFront(win);

            /* Don't eat the event for plain non-button clicks */
            if (!e.target.closest('.mac-btn, .mac-nav-btn, .mac-urlbar-pill,\
                                    .mac-titlebar-right')) {
                e.preventDefault();
            }

            function onMove(ev) {
                var dx = ev.clientX - sx, dy = ev.clientY - sy;
                if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
                if (moved) {
                    win.style.left = (sl + dx) + 'px';
                    win.style.top  = (st + dy) + 'px';
                }
            }
            function onUp() {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup',  onUp);
                if (moved) {
                    win.dataset.moved = '1'; /* prevent cascade off this window */
                    /* Swallow the click that would fire on a button we dragged from */
                    win.addEventListener('click', function h(ev) {
                        ev.stopPropagation();
                        ev.preventDefault();
                    }, { capture: true, once: true });
                }
            }
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup',  onUp);
        });
    });

    /* ── Finder grid ────────────────────────────────────────── */
    function populateFinderGrid() {
        var grid = document.getElementById('finder-wallpapers');
        WALLPAPERS.forEach(function (wp, i) {
            var btn = document.createElement('button');
            btn.className = 'mac-finder-thumb';
            btn.setAttribute('aria-label', wp.name);

            var img    = document.createElement('img');
            img.src    = wp.thumb;
            img.alt    = wp.name;
            img.width  = 120;
            img.height = 213;
            img.loading = 'lazy';
            img.style.height = 'auto';

            var lbl = document.createElement('span');
            lbl.textContent = wp.name;

            btn.appendChild(img);
            btn.appendChild(lbl);
            btn.addEventListener('click', function () { openPreview(i); });
            grid.appendChild(btn);
        });
        finderPopulated = true;
    }

    /* ── Image Preview (macOS Preview-style window) ─────────── */
    var previewIdx = 0;
    var previewMode = 'gallery'; /* 'gallery' | 'single' */

    function openPreview(index) {
        previewMode = 'gallery';
        previewIdx = (index + WALLPAPERS.length) % WALLPAPERS.length;
        var wp = WALLPAPERS[previewIdx];

        document.getElementById('preview-img').src = wp.thumb;
        document.getElementById('preview-img').alt = wp.name;
        document.getElementById('preview-title').textContent = wp.name;
        document.getElementById('preview-counter-bar').textContent =
            (previewIdx + 1) + ' / ' + WALLPAPERS.length;

        var dl = document.getElementById('preview-dl');
        dl.href = wp.full;
        dl.setAttribute('download', wp.filename);

        /* Show toolbar + nav */
        document.getElementById('preview-toolbar').hidden = false;
        var showNav = WALLPAPERS.length > 1;
        document.getElementById('preview-prev').style.display = showNav ? '' : 'none';
        document.getElementById('preview-next').style.display = showNav ? '' : 'none';

        openMacWin('win-preview');
    }

    /**
     * Open a single image — no download bar, no navigation.
     */
    function openSinglePreview(src, name) {
        previewMode = 'single';

        document.getElementById('preview-img').src = src;
        document.getElementById('preview-img').alt = name || '';
        document.getElementById('preview-title').textContent = name || '';

        /* Hide toolbar entirely — window body expands to fill */
        document.getElementById('preview-toolbar').hidden = true;
        document.getElementById('preview-prev').style.display = 'none';
        document.getElementById('preview-next').style.display = 'none';

        openMacWin('win-preview');
    }

    document.getElementById('preview-prev').addEventListener('click', function (e) {
        e.stopPropagation();
        openPreview(previewIdx - 1);
    });
    document.getElementById('preview-next').addEventListener('click', function (e) {
        e.stopPropagation();
        openPreview(previewIdx + 1);
    });

    /* Keyboard nav inside the preview window */
    document.getElementById('win-preview').addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft')  openPreview(previewIdx - 1);
        if (e.key === 'ArrowRight') openPreview(previewIdx + 1);
    });

    /* Swipe for preview on touch */
    (function () {
        var tx = 0;
        var pw = document.getElementById('win-preview');
        pw.addEventListener('touchstart', function (e) {
            tx = e.changedTouches[0].clientX;
        }, { passive: true });
        pw.addEventListener('touchend', function (e) {
            var dx = e.changedTouches[0].clientX - tx;
            if (Math.abs(dx) > 50) openPreview(previewIdx + (dx < 0 ? 1 : -1));
        }, { passive: true });
    })();

    /* ── Desktop icon drag + click system ──────────────────── */
    (function initDesktopIcons() {
        var STORE = 'lab-icon-pos';

        function loadPos() {
            try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; }
        }
        function savePos(id, x, y) {
            var pos = loadPos();
            pos[id] = { x: x, y: y };
            localStorage.setItem(STORE, JSON.stringify(pos));
        }

        var saved = loadPos();

        document.querySelectorAll('.lab-desktop-icon[data-icon-id]').forEach(function (icon) {
            var id = icon.dataset.iconId;

            if (saved[id]) {
                /* Only restore if the icon would be visible on the current screen */
                var vw = window.innerWidth, vh = window.innerHeight;
                if (saved[id].x < vw - 20 && saved[id].y < vh - 20) {
                    icon.style.left = saved[id].x + 'px';
                    icon.style.top  = saved[id].y + 'px';
                }
            }

            var dragging = false, moved = false, wasDragged = false;
            var startX, startY, startL, startT;

            icon.addEventListener('pointerdown', function (e) {
                if (e.button !== 0) return;
                dragging = true; moved = false;
                startX = e.clientX; startY = e.clientY;
                startL = icon.offsetLeft; startT = icon.offsetTop;
                icon.setPointerCapture(e.pointerId);
                icon.style.zIndex = '10';
            });

            icon.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var dx = e.clientX - startX, dy = e.clientY - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { moved = true; wasDragged = true; }
                if (moved) {
                    icon.style.left = (startL + dx) + 'px';
                    icon.style.top  = (startT + dy) + 'px';
                    e.preventDefault();
                }
            });

            icon.addEventListener('pointerup', function () {
                if (!dragging) return;
                dragging = false; icon.style.zIndex = '';
                if (moved) savePos(id, icon.offsetLeft, icon.offsetTop);
            });

            function activateIcon() {
                if (icon.dataset.previewSrc) {
                    openSinglePreview(icon.dataset.previewSrc, icon.dataset.previewName || '');
                } else if (icon.dataset.window) {
                    openMacWin(icon.dataset.window);
                } else if (icon.dataset.href) {
                    window.location.href = icon.dataset.href;
                }
            }

            icon.addEventListener('click', function () {
                if (wasDragged) { wasDragged = false; return; }
                activateIcon();
            });

            icon.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                activateIcon();
            });
        });
    })();
    </script>
