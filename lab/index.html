<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab | Hubiyan</title>
    <meta name="description" content="Hubiyan Lab: experiments, tools, and prototypes.">
    <link rel="icon" type="image/x-icon" href="../images/logos/main-logo.png">
    <link rel="stylesheet" href="../bootstrap.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../lab.css">
</head>

<body class="ds-subpage lab-page" data-mat-color="green">

    <main id="lab-main" class="lab-main" aria-label="Lab projects">

        <header class="lab-header">
            <p class="lab-eyebrow">Hubiyan presents:</p>
            <h1 class="lab-title">The lab</h1>
            <p class="lab-subtitle">Experiments, tools, and things I ship when the main site is behaving.</p>
        </header>

        <a class="lab-project-folder-link" href="#lab-projects-grid" aria-label="Open project folder">
            <!--
              Geometry (oblique projection, 30° receding angle):
                bw=260  bh=175  dx=78 (depth×cos30)  dy=45 (depth×sin30)
              ViewBox: 338 × 220
              Top face  : (78,0)  (338,0) (260,45) (0,45)
              Front face: (0,45)  (260,45) (260,220) (0,220)
              Right side: (260,45)(338,0)  (338,175)(260,220)
            -->
            <svg class="lab-folder-svg" viewBox="0 0 338 220"
                 xmlns="http://www.w3.org/2000/svg"
                 aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="lf-front-shade" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0.11)"/>
                        <stop offset="28%"  stop-color="rgba(255,255,255,0)"/>
                        <stop offset="100%" stop-color="rgba(100,58,20,0.10)"/>
                    </linearGradient>
                    <linearGradient id="lf-top-shade" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
                    </linearGradient>
                    <linearGradient id="lf-side-shade" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%"   stop-color="rgba(0,0,0,0.03)"/>
                        <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
                    </linearGradient>
                    <!-- subtle vertical corrugation grain on front -->
                    <pattern id="lf-grain" x="0" y="0" width="9" height="220"
                             patternUnits="userSpaceOnUse">
                        <line x1="0.4" y1="0" x2="0.4" y2="220"
                              stroke="rgba(90,52,18,0.055)" stroke-width="0.6"/>
                    </pattern>
                    <!-- clip path so grain stays inside front face -->
                    <clipPath id="lf-front-clip">
                        <polygon points="0,45 260,45 260,220 0,220"/>
                    </clipPath>
                </defs>

                <!-- ── Right side face (darkest) ─────────────── -->
                <polygon class="lab-folder-side"
                         points="260,45 338,0 338,175 260,220"/>
                <polygon fill="url(#lf-side-shade)"
                         points="260,45 338,0 338,175 260,220"/>

                <!-- ── Top face (lightest) ────────────────────── -->
                <polygon class="lab-folder-top"
                         points="78,0 338,0 260,45 0,45"/>
                <polygon fill="url(#lf-top-shade)"
                         points="78,0 338,0 260,45 0,45"/>

                <!-- ── Front face (mid tone) ──────────────────── -->
                <polygon class="lab-folder-front"
                         points="0,45 260,45 260,220 0,220"/>
                <!-- grain -->
                <rect x="0" y="45" width="260" height="175"
                      fill="url(#lf-grain)" clip-path="url(#lf-front-clip)"/>
                <!-- ambient shade -->
                <polygon fill="url(#lf-front-shade)"
                         points="0,45 260,45 260,220 0,220"/>

                <!-- ── Flap crease line on front (~21% from top) -->
                <line x1="0"   y1="83" x2="260" y2="83"
                      stroke="rgba(255,255,255,0.13)" stroke-width="0.7"/>
                <line x1="0"   y1="84" x2="260" y2="84"
                      stroke="rgba(90,52,18,0.22)"  stroke-width="1"/>

                <!-- ── Tape patches on front (flanking the crease) -->
                <rect class="lab-folder-tape" x="28" y="51"
                      width="52" height="21" rx="1.5" opacity="0.72"/>
                <rect fill="rgba(255,255,255,0.07)" x="28" y="51"
                      width="52" height="21" rx="1.5" opacity="0.72"/>
                <rect class="lab-folder-tape" x="28" y="77"
                      width="52" height="21" rx="1.5" opacity="0.67"/>
                <rect fill="rgba(255,255,255,0.07)" x="28" y="77"
                      width="52" height="21" rx="1.5" opacity="0.67"/>

                <!-- ── Tape strip on top face (along center seam) -->
                <!-- seam: front-center (130,45) → back-center (208,0) -->
                <polygon class="lab-folder-tape"
                         points="121,45 139,45 217,0 199,0" opacity="0.70"/>
                <polygon fill="rgba(255,255,255,0.07)"
                         points="121,45 139,45 217,0 199,0" opacity="0.70"/>

                <!-- ── Edge highlights / shadows ──────────────── -->
                <!-- top front edge -->
                <line x1="0"   y1="45" x2="260" y2="45"
                      stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
                <!-- top-left receding edge -->
                <line x1="0"   y1="45" x2="78"  y2="0"
                      stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
                <!-- top back edge -->
                <line x1="78"  y1="0"  x2="338" y2="0"
                      stroke="rgba(255,255,255,0.16)" stroke-width="0.8"/>
                <!-- front/side edge (hard shadow) -->
                <line x1="260" y1="45" x2="260" y2="220"
                      stroke="rgba(0,0,0,0.20)" stroke-width="1.2"/>
                <!-- bottom front edge -->
                <line x1="0"   y1="220" x2="260" y2="220"
                      stroke="rgba(0,0,0,0.10)" stroke-width="0.8"/>
                <!-- bottom right edge -->
                <line x1="260" y1="220" x2="338" y2="175"
                      stroke="rgba(0,0,0,0.14)" stroke-width="0.8"/>

                <!-- ── Label sticker ──────────────────────────── -->
                <rect class="lab-folder-label-bg"
                      x="166" y="188" width="80" height="23" rx="2.5"/>
                <text class="lab-folder-label-text"
                      x="206" y="204" text-anchor="middle">PROJECTS</text>
            </svg>
        </a>

        <div class="lab-cards" id="lab-projects-grid">

            <a class="lab-card" href="/lab/prompts/">
                <h2 class="lab-card-title">Prompts</h2>
                <p class="lab-card-desc">Copy-paste fuel for when your blank doc is silently judging you.</p>
                <span class="lab-card-arrow" aria-hidden="true">→</span>
            </a>

            <a class="lab-card" href="/lab/ai-bro-detector/">
                <h2 class="lab-card-title">AI Bro Detector</h2>
                <p class="lab-card-desc">Sniffs out bro energy in LinkedIn posts before you cringe-reply.</p>
                <span class="lab-card-arrow" aria-hidden="true">→</span>
            </a>

            <button type="button" class="lab-card lab-card--action" data-action="open-wallpapers"
                    aria-label="Visual Explorations — open wallpapers">
                <h2 class="lab-card-title">Visual Explorations</h2>
                <p class="lab-card-desc">Wallpapers for people who stare at their lock screen a little too long.</p>
                <span class="lab-card-arrow" aria-hidden="true">→</span>
            </button>

        </div>

    </main>

    <!-- Lightbox / Slideshow -->
    <div class="lab-lightbox" id="labLightbox" role="dialog" aria-modal="true"
         aria-label="Wallpaper slideshow" hidden>
        <div class="lab-lightbox-backdrop" data-close="lightbox"></div>

        <button class="lab-lightbox-close" aria-label="Close slideshow" data-close="lightbox">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <button class="lab-lightbox-nav lab-lightbox-nav--prev" id="lbPrev" aria-label="Previous wallpaper">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M13 3l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button class="lab-lightbox-nav lab-lightbox-nav--next" id="lbNext" aria-label="Next wallpaper">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M7 3l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div class="lab-lightbox-stage">
            <div class="lab-lightbox-print">
                <img class="lab-lightbox-img" id="lbImg" src="" alt="" width="360" height="640">
            </div>
        </div>

        <div class="lab-lightbox-footer">
            <div class="lab-lightbox-info">
                <span class="lab-lightbox-name" id="lbName"></span>
                <span class="lab-lightbox-counter" id="lbCounter"></span>
            </div>
            <a class="lab-lightbox-download" id="lbDownload" href="" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                    <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Download full resolution
            </a>
        </div>

        <div class="lab-lightbox-dots" id="lbDots" aria-hidden="true"></div>
    </div>

    <div class="lab-color-switcher" role="group" aria-label="Background colour">
        <button class="lab-swatch" data-color="green"  aria-label="Green mat"  aria-pressed="true"></button>
        <button class="lab-swatch" data-color="blue"   aria-label="Blue mat"   aria-pressed="false"></button>
        <button class="lab-swatch" data-color="black"  aria-label="Black mat"  aria-pressed="false"></button>
    </div>

    <script>
    (function () {
        var body = document.body;
        var swatches = document.querySelectorAll('.lab-swatch');
        var saved = localStorage.getItem('lab-mat-color');
        if (saved) {
            body.setAttribute('data-mat-color', saved);
            swatches.forEach(function (s) {
                s.setAttribute('aria-pressed', s.dataset.color === saved ? 'true' : 'false');
            });
        }
        swatches.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var color = btn.dataset.color;
                body.setAttribute('data-mat-color', color);
                localStorage.setItem('lab-mat-color', color);
                swatches.forEach(function (s) {
                    s.setAttribute('aria-pressed', s.dataset.color === color ? 'true' : 'false');
                });
            });
        });
    })();

    var WALLPAPERS = [
        {
            name: 'Andromeda Horizon',
            thumb: '/images/wallpapers/thumbs/Andromeda-horizon.webp',
            full: 'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon.png',
            filename: 'Andromeda-horizon.png'
        },
        {
            name: 'Andromeda Horizon No.1',
            thumb: '/images/wallpapers/thumbs/Andromeda-horizon-1.webp',
            full: 'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-1.png',
            filename: 'Andromeda-horizon-1.png'
        },
        {
            name: 'Andromeda Horizon No.2',
            thumb: '/images/wallpapers/thumbs/Andromeda-horizon-2.webp',
            full: 'https://raw.githubusercontent.com/Hubiyan/portfolio-live/main/images/wallpapers/Andromeda-horizon-2.png',
            filename: 'Andromeda-horizon-2.png'
        }
    ];

    var lightbox  = document.getElementById('labLightbox');
    var lbImg     = document.getElementById('lbImg');
    var lbName    = document.getElementById('lbName');
    var lbCounter = document.getElementById('lbCounter');
    var lbDl      = document.getElementById('lbDownload');
    var lbDots    = document.getElementById('lbDots');
    var lbPrev    = document.getElementById('lbPrev');
    var lbNext    = document.getElementById('lbNext');
    var lbCurrent = 0;

    WALLPAPERS.forEach(function (_, i) {
        var d = document.createElement('button');
        d.className = 'lab-lightbox-dot';
        d.setAttribute('aria-label', 'Go to wallpaper ' + (i + 1));
        d.addEventListener('click', function () { goTo(i); });
        lbDots.appendChild(d);
    });

    function goTo(index) {
        lbCurrent = (index + WALLPAPERS.length) % WALLPAPERS.length;
        var wp = WALLPAPERS[lbCurrent];
        lbImg.src = wp.thumb;
        lbImg.alt = wp.name;
        lbName.textContent = wp.name;
        lbCounter.textContent = (lbCurrent + 1) + ' / ' + WALLPAPERS.length;
        lbDl.href = wp.full;
        lbDl.setAttribute('download', wp.filename);
        lbDots.querySelectorAll('.lab-lightbox-dot').forEach(function (d, i) {
            d.classList.toggle('is-active', i === lbCurrent);
            d.setAttribute('aria-pressed', i === lbCurrent ? 'true' : 'false');
        });
    }

    function openLightbox(index) {
        lightbox.hidden = false;
        document.body.classList.add('lab-modal-open');
        goTo(index);
        lightbox.querySelector('.lab-lightbox-close').focus();
    }

    function closeLightbox() {
        lightbox.hidden = true;
        document.body.classList.remove('lab-modal-open');
    }

    document.querySelector('[data-action="open-wallpapers"]').addEventListener('click', function () {
        openLightbox(0);
    });

    lbPrev.addEventListener('click', function () { goTo(lbCurrent - 1); });
    lbNext.addEventListener('click', function () { goTo(lbCurrent + 1); });

    lightbox.addEventListener('click', function (e) {
        if (e.target.dataset.close === 'lightbox') closeLightbox();
    });

    lightbox.addEventListener('keydown', function (e) {
        if (e.key === 'Escape')     closeLightbox();
        if (e.key === 'ArrowLeft')  goTo(lbCurrent - 1);
        if (e.key === 'ArrowRight') goTo(lbCurrent + 1);
    });

    (function () {
        var touchStartX = 0;
        lightbox.addEventListener('touchstart', function (e) {
            touchStartX = e.changedTouches[0].clientX;
        }, { passive: true });
        lightbox.addEventListener('touchend', function (e) {
            var dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) goTo(lbCurrent + (dx < 0 ? 1 : -1));
        }, { passive: true });
    })();
    </script>
</body>

</html>
